<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<div th:replace="navbar :: body"></div>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 text-center"
         style="width: 100%; max-width: 450px;">

        <h3 class="fw-bold mb-4 text-primary">
            📊 Library Dashboard
        </h3>

        <div class="d-grid gap-3">

            <a href="/books" class="btn btn-primary btn-lg">
                📚 View Books
            </a>

            <!-- ADMIN ONLY -->
            <a th:if="${session.loggedUser.role == 'ADMIN'}"
               href="/books/add"
               class="btn btn-success btn-lg">
                ➕ Add Book
            </a>

            <a href="/issue" class="btn btn-warning btn-lg text-dark">
                📦 Issued Books
            </a>

        </div>

        <hr class="my-4">

        <p class="text-muted mb-0">
            Welcome,
            <strong th:text="${session.loggedUser.name}">User</strong>
        </p>

    </div>

</div>
<div th:replace="footer :: body"></div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
