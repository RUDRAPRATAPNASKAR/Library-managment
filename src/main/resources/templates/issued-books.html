<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issued Books</title>

 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!--Navbar -->
<div th:replace="navbar :: body"></div>

<div class="container mt-4">

    <div class="card shadow-sm p-4">

        <h3 class="fw-bold text-primary mb-4">
            📋 Issued Books
        </h3>

        <!-- No issued books -->
        <div th:if="${#lists.isEmpty(issues)}"
             class="alert alert-info text-center">
            📭 No books have been issued yet.
        </div>

        <!-- Issued books table -->
        <div th:unless="${#lists.isEmpty(issues)}" class="table-responsive">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Book ID</th>
                        <th>Issued To</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="issue : ${issues}">
                        <td th:text="${issue.id}"></td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${issue.bookId}">
                            </span>
                        </td>
                        <td th:text="${issue.issuedTo}"></td>
                        <td class="text-center">
                            <a th:href="@{/issue/return/{issueId}(issueId=${issue.id})}"
                               class="btn btn-success btn-sm"
                               onclick="return confirm('Return this book?')">
                                🔁 Return
                            </a>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

        <div class="mt-3">
            <a href="/books" class="btn btn-outline-secondary">
                ⬅ Back to Books
            </a>
        </div>

    </div>

</div>
<div th:replace="footer :: body"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
